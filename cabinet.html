<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Кабінет - ZONA RP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(120deg, #0a0a0a, #111);
    color: white;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 20px 50px;
}

.logo {
    color: red;
    font-size: 24px;
}

.btn {
    background: orange;
    padding: 10px 20px;
    border-radius: 6px;
    color: white;
    text-decoration: none;
}

/* блок */
.container {
    display: flex;
    justify-content: center;
    margin-top: 80px;
}

/* карточка */
.card {
    background: #111;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    text-align: center;
    box-shadow: 0 0 20px rgba(255,0,0,0.3);
}

.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin-bottom: 15px;
}

.stat {
    margin-top: 15px;
    padding: 10px;
    background: #1a1a1a;
    border-radius: 10px;
}
</style>

</head>

<body>

<header>
    <div class="logo">ZONA RP</div>
    <a href="index.html" class="btn">Назад</a>
</header>

<div class="container">
    <div class="card">

        <img src="https://i.imgur.com/1X6bK3R.png" class="avatar">

        <h2>Даніель</h2>
        <p>ID: 113199</p>

        <div class="stat">💰 Баланс: 37 730</div>
        <div class="stat">💵 Готівка: 2509</div>
        <div class="stat">⭐ Рівень: 14 LVL</div>
        <div class="stat">⏱ Онлайн: 13 днів</div>

    </div>
</div>

</body>
</html>
